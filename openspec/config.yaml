schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

rules:
  proposal:
    - Docs are written in typst, a new markup language, and stored in the `docs/tinymist` directory
    - Store all documentation (including that for users) in `docs/tinymist` directory, and development documentation in `docs/tinymist/dev` directory.
    - Never edit generated markdown docs directly, which contains header containing "This file is generated" note.
